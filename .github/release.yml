changelog:
  categories:
    - title: '✨ Features'
      labels:
        - 'feature'
        - 'feat'

    - title: '🐛 Bug Fixes'
      labels:
        - 'bug'
        - 'fix'

    - title: '♻️ Refactoring'
      labels:
        - 'refactor'

    - title: '📦 Dependencies'
      labels:
        - 'dependencies'

    - title: '🧠 CI / Tooling'
      labels:
        - 'ci'
        - 'github-actions'

    - title: '🛡️ Security'
      labels:
        - 'security'

    - title: '🧩 Other Changes'
      labels:
        - '*'
