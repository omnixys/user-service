# Omnixys Workflow Suite – dependabot.yml
# Purpose: Automated dependency management and security updates across ecosystems.
# Language: Universal
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '03:00'
      timezone: 'Europe/Berlin'
    commit-message:
      prefix: 'deps(node)'
      include: 'scope'
    labels:
      - '📦 dependencies'
      - '🧩 needs-review'
    open-pull-requests-limit: 10
    rebase-strategy: auto
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
    ignore:
      - dependency-name: 'eslint'
        versions: ['<9.0.0']
      - dependency-name: 'typescript'
        versions: ['<5.0.0']

  # 🐳 Docker Base Image Updates
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:00'
      timezone: 'Europe/Berlin'
    commit-message:
      prefix: 'deps(docker)'
      include: 'scope'
    labels:
      - '🐳 docker'
      - '🧩 needs-review'
    rebase-strategy: auto
    ignore:
      - dependency-name: 'node'
        versions: ['<20.0.0']

  # ⚙️ GitHub Actions Updates
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Berlin'
    commit-message:
      prefix: 'deps(actions)'
      include: 'scope'
    labels:
      - '🧠 ci'
      - '📦 dependencies'
    open-pull-requests-limit: 5
    rebase-strategy: auto
