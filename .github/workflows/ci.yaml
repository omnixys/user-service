# Omnixys Workflow Suite – ci.yml
# Purpose: Continuous Integration pipeline for all pushes and pull requests.
# Language: Node / TypeScript (pnpm)

name: Continuous Integration – Omnixys

on:
  push:
    branches:
      - main
      - '!release'
  pull_request:
    branches:
      - '**'
      - '!release'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read
  issues: write
  pull-requests: write

env:
  COSIGN_EXPERIMENTAL: 'true'
  IMAGE_NAME: ${{ secrets.DOCKER_USER }}/${{ vars.SERVICE }}-service
  IMAGE_NAME_REPOSITORY: ghcr.io/${{ github.repository }}


jobs:
    
  ci:
    name: Run Lint, Build and Typecheck
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, 'chore(version)') &&
      !contains(github.event.head_commit.message, 'docs(changelog)')

    strategy:
      matrix:
        node-version: [24.10.0]

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: ♻️ Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Setup npm registry auth
        run: |
          echo "@omnixys:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${OMNIXYS_TOKEN}" >> .npmrc
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 🔍 Lint check
        run: pnpm lint

      - name: 🧱 Build project
        run: pnpm build

      - name: 🔤 Typecheck
        run: npx tsc

  release:
    needs: ci
    if: github.ref == 'refs/heads/main'
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.read_version.outputs.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.10.0]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup npm registry auth
        run: |
          echo "@omnixys:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${OMNIXYS_TOKEN}" >> .npmrc
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: ⚙️ Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: ♻️ Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 🚀 Semantic Release
        id: semantic
        run: |
          OUTPUT=$(pnpm run release || true)
          echo "$OUTPUT"
      
          if echo "$OUTPUT" | grep -q "Published"; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: Read version
        run: |
          echo "CURRENT_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "CURRENT_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Update repo variable
        env:
          GH_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
        run: |
          gh variable set CURRENT_VERSION \
            --body "$CURRENT_VERSION" \
            --repo omnixys/${{ vars.SERVICE }}-service

      - name: Update org variable
        env:
          GH_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
        run: |
          gh variable set CURRENT_DATE \
            --body "$CURRENT_DATE" \
            --org omnixys \
            --visibility all

  push-docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    name: 🐳 Build & Push Multi-Arch Images (Docker)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.10.0]

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: Setup npm registry auth
        run: |
          echo "@omnixys:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${OMNIXYS_TOKEN}" >> .npmrc
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 🔎 Check if Docker tag already exists
        id: check_tag
        run: |
          set -e

          echo "Checking if tag exists: $IMAGE_NAME:${CURRENT_VERSION}"

          if docker manifest inspect "$IMAGE_NAME:${CURRENT_VERSION}" > /dev/null 2>&1; then
            echo "Tag exists → skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist → build required"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:latest

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build and Push Docker Image (Multi-Arch)
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          secrets: |
            omnixys_token=${{ secrets.OMNIXYS_TOKEN }}
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ vars.CURRENT_VERSION }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ vars.CURRENT_VERSION }}
            org.opencontainers.image.description=Omnixys Microservice – ${{ env.IMAGE_NAME }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          build-args: |
            REVISION=${{ github.sha }}
            CREATED=${{ vars.CURRENT_DATE }}
            APP_VERSION=${{ vars.CURRENT_VERSION }}
            APP_NAME=${{ vars.SERVICE }}
            NODE_VERSION=${{ matrix.node-version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image with cosign (OIDC/GitHub)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cosign sign --yes --recursive ${{ env.IMAGE_NAME }}:${{ vars.CURRENT_VERSION }}
          cosign sign --yes --recursive ${{ env.IMAGE_NAME }}:latest

  push-github:
    needs: release
    if: needs.release.outputs.released == 'true'
    name: 🐳 Build & Push Multi-Arch Images (Github)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.10.0]

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🔎 Check if Docker tag already exists
        id: check_tag
        run: |
          set -e

          echo "Checking if tag exists: $IMAGE_NAME:${CURRENT_VERSION}"

          if docker manifest inspect "$IMAGE_NAME:${CURRENT_VERSION}" > /dev/null 2>&1; then
            echo "Tag exists → skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist → build required"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build and Push Docker Image (GHCR)
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          secrets: |
            omnixys_token=${{ secrets.OMNIXYS_TOKEN }}
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME_REPOSITORY }}:${{ vars.CURRENT_VERSION }}
            ${{ env.IMAGE_NAME_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ vars.CURRENT_VERSION }}
            org.opencontainers.image.description=Omnixys Microservice – ${{ env.IMAGE_NAME }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          build-args: |
            REVISION=${{ github.sha }}
            CREATED=${{ vars.CURRENT_DATE }}
            APP_VERSION=${{ vars.CURRENT_VERSION }}
            APP_NAME=${{ vars.SERVICE }}
            NODE_VERSION=${{ matrix.node-version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image with cosign (OIDC/GitHub)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cosign sign --yes --recursive ${{ env.IMAGE_NAME_REPOSITORY }}:${{ vars.CURRENT_VERSION }}
          cosign sign --yes --recursive ${{ env.IMAGE_NAME_REPOSITORY }}:latest

